<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <link rel="stylesheet" href="popup.css">
  <title>WordFlow</title>
</head>
<body>

  <!-- ====== Header ====== -->
  <header id="header">
    <span class="logo">WordFlow</span>
    <div class="header-actions">
      <button class="icon-btn" id="btn-search" title="搜索">🔍</button>
      <button class="icon-btn" id="btn-sort" title="排序">⇅</button>
      <button class="icon-btn" id="btn-settings" title="设置">⚙</button>
    </div>
  </header>

  <!-- ====== Search Bar ====== -->
  <div id="search-bar" class="hidden">
    <input type="text" id="search-input" placeholder="搜索单词或释义...">
    <button id="search-cancel">取消</button>
  </div>

  <!-- ====== Count Bar ====== -->
  <div id="count-bar">▌ <span id="count-text">0</span> 词</div>

  <!-- ====== Word List ====== -->
  <div id="word-list"></div>

  <!-- ====== Empty State ====== -->
  <div id="empty-state" class="hidden">
    <p>选中网页中的英文单词</p>
    <p>即可存入词展</p>
  </div>

  <!-- ====== Footer ====== -->
  <footer id="footer">
    <button id="btn-sync">🔄 同步</button>
    <button id="btn-export">导出</button>
  </footer>

  <!-- ====== Settings Overlay ====== -->
  <div id="settings-overlay" class="hidden">
    <div class="settings-header">
      <span class="settings-title">设置</span>
      <button class="icon-btn" id="settings-close">✕</button>
    </div>
    <div class="settings-body">
      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">划词模式</div>
          <div class="setting-desc">选中即弹</div>
        </div>
        <select id="sel-mode">
          <option value="auto">选中即弹</option>
          <option value="disabled">关闭划词</option>
        </select>
      </div>
      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">自动发音</div>
          <div class="setting-desc">查词成功后自动播放</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="auto-speak">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">DeepSeek API Key</div>
          <div class="setting-desc">用于语境释义和段落翻译</div>
        </div>
      </div>
      <div style="padding:0 16px 8px">
        <input type="password" id="deepseek-key" class="setting-input" placeholder="sk-...">
      </div>

      <div class="setting-divider"></div>

      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">坚果云同步</div>
          <div class="setting-desc">WebDAV 跨设备同步</div>
        </div>
      </div>
      <div style="padding:0 16px 6px">
        <input type="text" id="webdav-user" class="setting-input" placeholder="坚果云账号（邮箱）">
        <input type="password" id="webdav-pass" class="setting-input" placeholder="应用密码（非登录密码）" style="margin-top:6px">
        <div style="display:flex; gap:8px; margin-top:8px">
          <button class="setting-btn" id="btn-test-webdav">测试连接</button>
          <button class="setting-btn setting-btn-primary" id="btn-sync-now">立即同步</button>
        </div>
        <div id="sync-status" class="sync-status"></div>
      </div>

      <div class="setting-divider"></div>

      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">导出格式</div>
        </div>
        <select id="sel-export">
          <option value="bubei">不背单词</option>
          <option value="momo">墨墨背单词</option>
          <option value="anki">Anki</option>
          <option value="quizlet">Quizlet</option>
          <option value="txt">通用 TXT</option>
          <option value="csv">通用 CSV</option>
        </select>
      </div>

      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">清空复习进度</div>
          <div class="setting-desc">重置所有 SM-2 复习状态</div>
        </div>
        <button class="setting-btn setting-btn-danger" id="btn-clear-reviews">清空</button>
      </div>

      <div class="setting-divider"></div>

      <div class="setting-footer">
        <span>WordFlow v2.0.0</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
